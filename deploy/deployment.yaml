apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp
  namespace: k8s-mcp
  labels:
    app: k8s-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-mcp
  template:
    metadata:
      labels:
        app: k8s-mcp
    spec:
      serviceAccountName: k8s-mcp
      containers:
        - name: k8s-mcp
          # 构建镜像: docker build -t k8s-mcp:latest .
          # 或使用私有仓库: docker build -t registry.example.com/k8s-mcp:latest .
          image: k8s-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          args:
            - -mode=http
            # 可选: 启用 API 密钥认证
            # - -apiKey=my-secret-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
